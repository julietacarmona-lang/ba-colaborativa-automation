name: Bajada diaria de tickets BA Colaborativa

on:
  # Cada 1h: máxima frecuencia para mantener cookies vivas y aumentar
  # chances de recuperación. Pareado con anti-spam abajo, así si el
  # chain se rompe NO satura mis-bots-notis (solo avisa el primer
  # fallo del chain).
  schedule:
    # Cada 4 horas en horario laboral Argentina (UTC-3):
    # 8am, 12pm, 4pm, 8pm = 11, 15, 19, 23 UTC
    - cron: "0 11,15,19,23 * * *"
  workflow_dispatch:
    inputs:
      skip_slack:
        description: "No mandar mensaje a Slack (útil para pruebas)"
        type: boolean
        default: false

# Si ya hay un run corriendo cuando llega el siguiente cron, lo encola en vez
# de correrlo en paralelo. Dos logins concurrentes pueden pisar el secret
# BA_SESSION_JSON o gastar dos slots de CapSolver.
concurrency:
  group: ba-colaborativa-pipeline
  cancel-in-progress: false

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    # 45 min para que MAX_ATTEMPTS=10 entre dentro del presupuesto sin que
    # GH Actions cancele a mitad de camino.
    timeout-minutes: 45

    env:
      # Credenciales de BA Colaborativa (fallback si las cookies expiraron).
      BA_USER: ${{ secrets.BA_USER }}
      BA_PASSWORD: ${{ secrets.BA_PASSWORD }}

      # Cookies pre-autenticadas extraídas con scripts/dump_cookies.py.
      # Saltean el login del SPA. Cuando expiren (típico días/semanas),
      # alguien del equipo refresca con el runbook del README.
      BA_SESSION_JSON: ${{ secrets.BA_SESSION_JSON }}

      # Google Sheets
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_TAB: ${{ vars.SHEET_TAB || 'Tickets - General' }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      # En CI lanzamos Chrome NOSOTROS (no Playwright) y nos conectamos por
      # CDP — así Chrome arranca SIN flags de automation y reCAPTCHA no nos
      # detecta como bot. Replicamos lo que hace ./scripts/chrome-cdp.sh local.
      HEADLESS: "false"
      BROWSER_MODE: cdp
      CDP_URL: http://localhost:9222
      LOGIN_MODE: auto
      # 10 intentos por corrida. Después de N fallos consecutivos con captcha,
      # Keycloak eventualmente skipea y la corrida pasa. 10 chances le dan más
      # margen para esa "suerte" sin gastarnos más que ~$0.05/día en CapSolver.
      MAX_ATTEMPTS: "5"
      SAVED_FILTER_NAME: ${{ vars.SAVED_FILTER_NAME || 'Asignados a Milton' }}

      # Feature 2026-06-08: procesar URLs de adjuntos al final del cron.
      # ADJUNTOS_MAX_TICKETS limita cuántos tickets se procesan por corrida
      # (cada uno toma ~30s: navegar al detalle, click adjunto, volver).
      # Empezamos con 2 como prueba; subir a 20 cuando confirmemos OK.
      PROCESAR_ADJUNTOS: "1"
      ADJUNTOS_MAX_TICKETS: "20"

      # Notificación por mail en caso de fallo
      ALERT_TO_EMAIL: julieta.carmona@educabot.com
      # Configurar uno de los dos backends de mail:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      # Slack — dos webhooks separados:
      # - SLACK_WEBHOOK_URL: éxitos (canal del equipo). Mensaje "✅ N tickets…"
      # - SLACK_WEBHOOK_URL_ERROR: errores (canal privado del owner).
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
      # SKIP_SLACK=1 silencia el webhook de éxito sin tickets nuevos. Lo
      # activamos solo en pruebas manuales con skip_slack=true. El cron
      # cada hora NO lo activa: notify.send_success_message ya se encarga
      # de mandar a Slack solo cuando added>0 (forced), así que el cron
      # silencioso no spamea.
      SKIP_SLACK: ${{ inputs.skip_slack == true && '1' || '' }}
      # Solvers de captcha. Si ambos están, scraper.py prueba CapSolver primero
      # (mejor con reCAPTCHA Enterprise V3 del GCBA) y cae a anti-captcha si falla.
      CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
      ANTICAPTCHA_API_KEY: ${{ secrets.ANTICAPTCHA_API_KEY }}
      # Link al Sheets (se incluye al final de cada mensaje de Slack).
      SHEET_LINK: ${{ vars.SHEET_LINK }}
      # SMTP_HOST: ${{ secrets.SMTP_HOST }}
      # SMTP_PORT: ${{ secrets.SMTP_PORT }}
      # SMTP_USER: ${{ secrets.SMTP_USER }}
      # SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome (canal "chrome" para channel=chrome)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Playwright browsers + system deps
        run: python -m playwright install --with-deps chromium chrome

      - name: Install Xvfb (display virtual para correr headed)
        run: sudo apt-get install -y xvfb

      - name: Lanzar Chrome con remote debugging (NO con Playwright)
        # Lanzamos Chrome NOSOTROS via shell, sin flags de automation, así
        # reCAPTCHA no lo detecta como bot. Después el scraper se conecta por
        # CDP. Replica exactamente lo que hace ./scripts/chrome-cdp.sh local.
        run: |
          # Display virtual
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 1
          export DISPLAY=:99
          # Chrome con remote debugging, perfil dedicado
          mkdir -p /tmp/chrome-cdp-profile
          google-chrome \
            --remote-debugging-port=9222 \
            --user-data-dir=/tmp/chrome-cdp-profile \
            --no-default-browser-check \
            --no-first-run \
            --disable-dev-shm-usage \
            --no-sandbox \
            --disable-gpu \
            --disable-software-rasterizer \
            --disable-extensions \
            'about:blank' &
          # Esperar a que el puerto CDP esté listo (max 30s)
          for i in {1..30}; do
            if curl -sf http://localhost:9222/json/version > /dev/null; then
              echo "✓ Chrome CDP listo (intento $i)"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:9222/json/version

      - name: Run pipeline (CDP a Chrome lanzado externamente)
        run: |
          export DISPLAY=:99
          python main.py

      - name: Refrescar BA_SESSION_JSON con cookies renovadas
        # Solo si la corrida fue OK y el scraper dejó session_refreshed.json.
        # Esto extiende la vida de la sesión: las cookies que Keycloak renovó
        # durante esta corrida quedan guardadas para la siguiente.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ GH_PAT no configurado — las cookies no se pueden renovar automáticamente."
            if [ -n "$SLACK_WEBHOOK_URL_ERROR" ]; then
              curl -sS -X POST -H 'Content-Type: application/json' \
                --data '{"text":"⚠️ *BA Colaborativa*: Secret `GH_PAT` no está configurado. Las cookies de sesión NO se renuevan automáticamente — cuando expiren el pipeline va a empezar a fallar con captchas. Solucion: creá un PAT en GitHub y setealo como secret `GH_PAT`.","username":"BA Colaborativa Bot","icon_emoji":":warning:"}' \
                "$SLACK_WEBHOOK_URL_ERROR" || true
            fi
            exit 0
          fi
          if [ -f downloads/session_refreshed.json ]; then
            if gh secret set BA_SESSION_JSON \
              --body "$(cat downloads/session_refreshed.json)" \
              --repo ${{ github.repository }} 2>&1; then
              echo "✓ Secret BA_SESSION_JSON actualizado con cookies frescas."
            else
              echo "⚠️ No pude actualizar BA_SESSION_JSON — GH_PAT puede estar expirado o sin permisos."
              if [ -n "$SLACK_WEBHOOK_URL_ERROR" ]; then
                curl -sS -X POST -H 'Content-Type: application/json' \
                  --data '{"text":"⚠️ *BA Colaborativa*: No pude renovar las cookies en GitHub Secrets (GH_PAT expirado o sin permisos). Las cookies se van a degradar hasta que expire la sesión. Solución: regenerá el PAT en GitHub y actualizá el secret `GH_PAT`.","username":"BA Colaborativa Bot","icon_emoji":":warning:"}' \
                  "$SLACK_WEBHOOK_URL_ERROR" || true
              fi
            fi
          else
            echo "(no actualizo secret — falta session_refreshed.json)"
          fi

      - name: Upload exported file as artifact (on failure for debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-dumps
          path: downloads/
          if-no-files-found: ignore

      - name: Avisar a Slack si falló (sin pausar el cron)
        # El cron NUNCA se pausa automáticamente — si falla, sigue intentando.
        # El mensaje de Slack le dice exactamente qué pasó y qué hacer.
        if: ${{ (failure() || cancelled()) && env.SLACK_WEBHOOK_URL_ERROR != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          EVENT: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          DIAG="❓ No pude inferir el tipo de fallo."
          ACCION="Escribí */bajada-tickets* en Slack para reintentar. Si sigue fallando, avisá a quien administra el bot."
          DUR=$(gh run view "$RUN_ID" --json jobs --jq '.jobs[0] | (.completedAt | fromdateiso8601) - (.startedAt | fromdateiso8601)' 2>/dev/null || echo "0")
          echo "Duración job: ${DUR}s, status: $STATUS"
          if [ "$STATUS" = "cancelled" ]; then
            DIAG="⏱️ El job tardó más de 45 minutos y se canceló solo."
            ACCION="Escribí */bajada-tickets* para reintentar. Si pasa seguido, avisá a quien administra el bot."
          else
            LOG=$(gh run view "$RUN_ID" --log 2>&1 || echo "")
            if echo "$LOG" | grep -q "Usuario o contraseña incorrectos"; then
              DIAG="🔐 La contraseña de BA Colaborativa está mal o cambió."
              ACCION="Avisá a quien administra el bot — hay que actualizar la contraseña en los secrets de GitHub."
            elif echo "$LOG" | grep -qE "BA Colaborativa parece estar caída|PlatformDownError"; then
              DIAG="🌩️ BA Colaborativa (la web del GCBA) parece estar caída."
              ACCION="No hace falta hacer nada. El bot va a reintentar solo en la próxima corrida automática."
            elif echo "$LOG" | grep -qE "captchas? rechazado|CaptchaRejectedError|Error en el reCAPTCHA"; then
              DIAG="🤖 El captcha del login no se pudo resolver."
              ACCION="Suele resolverse solo. Escribí */bajada-tickets* en unas horas para reintentar."
            elif echo "$LOG" | grep -qE "Target page.*closed|browser has been closed|Target closed"; then
              DIAG="💥 El navegador se cayó mientras corría."
              ACCION="Escribí */bajada-tickets* para reintentar — generalmente se soluciona solo."
            elif echo "$LOG" | grep -qE "fuera de servicio|500 Internal|backend.+5[0-9][0-9]"; then
              DIAG="🌩️ El servidor del GCBA devolvió un error (caída momentánea)."
              ACCION="Esperá 1-2 horas y escribí */bajada-tickets* para reintentar."
            elif echo "$LOG" | grep -qE "RuntimeError|TimeoutError.*selector|ng-select|modal.*Exportar"; then
              DIAG="🧩 El sitio de BA Colaborativa cambió algo y el bot no lo reconoció."
              ACCION="Avisá a quien administra el bot — necesita revisión técnica."
            fi
          fi
          TRIGGER="cron automático"
          [ "$EVENT" = "workflow_dispatch" ] && TRIGGER="disparo manual"
          TEXT="⚠️ *BA Colaborativa falló* ($TRIGGER)"$'\n'"*Qué pasó:* $DIAG"$'\n'"*Qué hacer:* $ACCION"$'\n'"<$RUN_URL|Ver detalle en GitHub Actions>"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg t "$TEXT" '{text: $t, username: "BA Colaborativa Bot", icon_emoji: ":rotating_light:"}')" \
            "$SLACK_WEBHOOK_URL_ERROR" || echo "(curl al webhook falló)"
