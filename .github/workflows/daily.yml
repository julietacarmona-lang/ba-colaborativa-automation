name: Bajada diaria de tickets BA Colaborativa

on:
  # Cada 1h: máxima frecuencia para mantener cookies vivas y aumentar
  # chances de recuperación. Pareado con anti-spam abajo, así si el
  # chain se rompe NO satura mis-bots-notis (solo avisa el primer
  # fallo del chain).
  schedule:
    # Cada 2hs en horario laboral Argentina (8am–8pm, UTC-3 = 11–23 UTC)
    - cron: "0 11,13,15,17,19,21,23 * * *"
  workflow_dispatch:
    inputs:
      skip_slack:
        description: "No mandar mensaje a Slack (útil para pruebas)"
        type: boolean
        default: false

# Si ya hay un run corriendo cuando llega el siguiente cron, lo encola en vez
# de correrlo en paralelo. Dos logins concurrentes pueden pisar el secret
# BA_SESSION_JSON o gastar dos slots de CapSolver.
concurrency:
  group: ba-colaborativa-pipeline
  cancel-in-progress: false

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    # 45 min para que MAX_ATTEMPTS=10 entre dentro del presupuesto sin que
    # GH Actions cancele a mitad de camino.
    timeout-minutes: 45

    env:
      # Credenciales de BA Colaborativa (fallback si las cookies expiraron).
      BA_USER: ${{ secrets.BA_USER }}
      BA_PASSWORD: ${{ secrets.BA_PASSWORD }}

      # Cookies pre-autenticadas extraídas con scripts/dump_cookies.py.
      # Saltean el login del SPA. Cuando expiren (típico días/semanas),
      # alguien del equipo refresca con el runbook del README.
      BA_SESSION_JSON: ${{ secrets.BA_SESSION_JSON }}

      # Google Sheets
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_TAB: ${{ vars.SHEET_TAB || 'Tickets - General' }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      # En CI lanzamos Chrome NOSOTROS (no Playwright) y nos conectamos por
      # CDP — así Chrome arranca SIN flags de automation y reCAPTCHA no nos
      # detecta como bot. Replicamos lo que hace ./scripts/chrome-cdp.sh local.
      HEADLESS: "false"
      BROWSER_MODE: cdp
      CDP_URL: http://localhost:9222
      LOGIN_MODE: auto
      # 10 intentos por corrida. Después de N fallos consecutivos con captcha,
      # Keycloak eventualmente skipea y la corrida pasa. 10 chances le dan más
      # margen para esa "suerte" sin gastarnos más que ~$0.05/día en CapSolver.
      MAX_ATTEMPTS: "10"
      SAVED_FILTER_NAME: ${{ vars.SAVED_FILTER_NAME || 'Asignados a Milton' }}

      # Feature 2026-06-08: procesar URLs de adjuntos al final del cron.
      # ADJUNTOS_MAX_TICKETS limita cuántos tickets se procesan por corrida
      # (cada uno toma ~30s: navegar al detalle, click adjunto, volver).
      # Empezamos con 2 como prueba; subir a 20 cuando confirmemos OK.
      PROCESAR_ADJUNTOS: "1"
      ADJUNTOS_MAX_TICKETS: "20"

      # Notificación por mail en caso de fallo
      ALERT_TO_EMAIL: julieta.carmona@educabot.com
      # Configurar uno de los dos backends de mail:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      # Slack — dos webhooks separados:
      # - SLACK_WEBHOOK_URL: éxitos (canal del equipo). Mensaje "✅ N tickets…"
      # - SLACK_WEBHOOK_URL_ERROR: errores (canal privado del owner).
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
      # SKIP_SLACK=1 silencia el webhook de éxito sin tickets nuevos. Lo
      # activamos solo en pruebas manuales con skip_slack=true. El cron
      # cada hora NO lo activa: notify.send_success_message ya se encarga
      # de mandar a Slack solo cuando added>0 (forced), así que el cron
      # silencioso no spamea.
      SKIP_SLACK: ${{ inputs.skip_slack == true && '1' || '' }}
      # Solvers de captcha. Si ambos están, scraper.py prueba CapSolver primero
      # (mejor con reCAPTCHA Enterprise V3 del GCBA) y cae a anti-captcha si falla.
      CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
      ANTICAPTCHA_API_KEY: ${{ secrets.ANTICAPTCHA_API_KEY }}
      # Link al Sheets (se incluye al final de cada mensaje de Slack).
      SHEET_LINK: ${{ vars.SHEET_LINK }}
      # SMTP_HOST: ${{ secrets.SMTP_HOST }}
      # SMTP_PORT: ${{ secrets.SMTP_PORT }}
      # SMTP_USER: ${{ secrets.SMTP_USER }}
      # SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome (canal "chrome" para channel=chrome)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Playwright browsers + system deps
        run: python -m playwright install --with-deps chromium chrome

      - name: Install Xvfb (display virtual para correr headed)
        run: sudo apt-get install -y xvfb

      - name: Lanzar Chrome con remote debugging (NO con Playwright)
        # Lanzamos Chrome NOSOTROS via shell, sin flags de automation, así
        # reCAPTCHA no lo detecta como bot. Después el scraper se conecta por
        # CDP. Replica exactamente lo que hace ./scripts/chrome-cdp.sh local.
        run: |
          # Display virtual
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 1
          export DISPLAY=:99
          # Chrome con remote debugging, perfil dedicado
          mkdir -p /tmp/chrome-cdp-profile
          google-chrome \
            --remote-debugging-port=9222 \
            --user-data-dir=/tmp/chrome-cdp-profile \
            --no-default-browser-check \
            --no-first-run \
            --disable-dev-shm-usage \
            --no-sandbox \
            'about:blank' &
          # Esperar a que el puerto CDP esté listo (max 30s)
          for i in {1..30}; do
            if curl -sf http://localhost:9222/json/version > /dev/null; then
              echo "✓ Chrome CDP listo (intento $i)"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:9222/json/version

      - name: Run pipeline (CDP a Chrome lanzado externamente)
        run: |
          export DISPLAY=:99
          python main.py

      - name: Refrescar BA_SESSION_JSON con cookies renovadas
        # Solo si la corrida fue OK y el scraper dejó session_refreshed.json.
        # Esto extiende la vida de la sesión: las cookies que Keycloak renovó
        # durante esta corrida quedan guardadas para la siguiente.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f downloads/session_refreshed.json ] && [ -n "$GH_TOKEN" ]; then
            gh secret set BA_SESSION_JSON \
              --body "$(cat downloads/session_refreshed.json)" \
              --repo ${{ github.repository }}
            echo "✓ Secret BA_SESSION_JSON actualizado con cookies frescas."
          else
            echo "(no actualizo secret — falta el archivo o GH_PAT no configurado)"
          fi

      - name: Upload exported file as artifact (on failure for debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-dumps
          path: downloads/
          if-no-files-found: ignore

      - name: Avisar a Slack y, si es 2da falla seguida, pausar el cron
        # Regla 2026-06-08:
        #  - CADA error notifica a mis-bots-notis (con emoji según gravedad).
        #  - 1er fail del chain (anterior fue success) → ⚠️ amarilla, el cron sigue.
        #  - 2do fail consecutivo → 🚨 roja + se PAUSA el cron (gh workflow disable).
        #    Cuando Juli arregle y corra refresh-session.sh, el script reactiva
        #    el cron (gh workflow enable + run).
        # Si el job se canceló (timeout 45min), GitHub mata Python antes
        # de que mande la noti desde adentro; este step corre afuera.
        if: ${{ (failure() || cancelled()) && env.SLACK_WEBHOOK_URL_ERROR != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          EVENT: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          # Conclusión del run inmediato anterior (el actual no aparece todavía en la lista).
          PREV=$(gh run list --workflow="$WORKFLOW_NAME" --branch=main --limit=2 --json conclusion --jq '.[1].conclusion // "none"' 2>/dev/null || echo "none")
          echo "Conclusión del run anterior: $PREV"
          # Diagnóstico priorizando señales rápidas (estado + duración), después patrón en log.
          DIAG="❓ No pude inferir el tipo de fallo. Revisá el run."
          ACCION="Mirá el log del run para más pistas."
          # Duración del job en segundos (este job, no del run completo)
          DUR=$(gh run view "$RUN_ID" --json jobs --jq '.jobs[0] | (.completedAt | fromdateiso8601) - (.startedAt | fromdateiso8601)' 2>/dev/null || echo "0")
          echo "Duración job: ${DUR}s, status: $STATUS"
          if [ "$STATUS" = "cancelled" ]; then
            DIAG="⏱️ El job se canceló (timeout 45min — el scraper se quedó colgado en algún paso)."
            ACCION="Mirá el log para ver dónde se trabó. Si pasó muchas veces seguidas, refrescá la sesión: \`./scripts/refresh-session.sh\`"
          elif [ "${DUR}" -lt 1800 ] 2>/dev/null && [ "${DUR}" != "0" ]; then
            # < 30min con failure → early abort por captcha rechazado (5 intentos espaciados)
            DIAG="🤖 Captcha rejected por Keycloak — el solver no pasó en los 5 intentos del run."
            ACCION="Esto es intermitente; suele resolverse solo en alguna corrida cercana. Si persiste 2+ runs seguidos, el workflow se pausa solo y vas a recibir alerta roja."
          else
            # Fallback: analizar log
            LOG=$(gh run view "$RUN_ID" --log 2>&1 || echo "")
            if echo "$LOG" | grep -q "Usuario o contraseña incorrectos"; then
              DIAG="🔐 Keycloak rechazó las credenciales — probablemente cambió la password de Cecilia."
              ACCION="Actualizá el secret con: \`gh secret set BA_PASSWORD --repo ${{ github.repository }}\`"
            elif echo "$LOG" | grep -qE "fuera de servicio|500 Internal Server|backend.+ 5[0-9][0-9]"; then
              DIAG="🌩️ Backend del GCBA caído (5xx). No es nuestro problema."
              ACCION="Esperá 1-2h. La próxima corrida del cron probablemente pase."
            elif echo "$LOG" | grep -qE "Error en el reCAPTCHA|captchas? rechazado"; then
              DIAG="🤖 Captcha rejected por Keycloak — el solver no pasa el score."
              ACCION="Es intermitente. Si persiste 4+ runs, refrescá la sesión: \`./scripts/refresh-session.sh\`"
            elif echo "$LOG" | grep -qE "RuntimeError|TimeoutError.+selector|ng-select|addButton|modal.+Exportar"; then
              DIAG="🧩 El SPA del GCBA cambió algo del DOM (selector roto)."
              ACCION="Avisame para que investigue."
            fi
          fi
          TRIGGER="cron \`$SCHEDULE\`"
          [ "$EVENT" = "workflow_dispatch" ] && TRIGGER="dispatch manual"
          # Severidad según si es el 1er fail o el 2do consecutivo.
          if [ "$PREV" = "success" ] || [ "$PREV" = "none" ]; then
            # 1er fail del chain: alerta amarilla, no pausamos.
            EMOJI="⚠️"
            HEADER="⚠️ *BA Colaborativa: corrida falló* ($TRIGGER)"
            EXTRA="_(Es la 1ra falla — el cron sigue corriendo. Si la próxima también falla, paso el cron a pausa y te aviso con alerta roja.)_"
          else
            # 2da+ falla consecutiva: alerta roja + pausar el cron.
            EMOJI="🚨"
            HEADER="🚨 *BA Colaborativa: 2 corridas seguidas fallaron — PAUSANDO el cron*"
            # Pausar el cron para que no siga corriendo en loop.
            if gh workflow disable "$WORKFLOW_NAME" --repo "${{ github.repository }}" 2>&1; then
              EXTRA="_(El cron quedó **pausado**. Para reactivarlo después de arreglar: corré \`./scripts/refresh-session.sh\` (lo reactiva solo) o desde la UI de GitHub Actions.)_"
            else
              EXTRA="_(Intenté pausar el cron pero el comando falló. Pausalo manualmente desde Actions → Workflows → ... → Disable workflow.)_"
            fi
          fi
          TEXT="$HEADER"$'\n'"*Diagnóstico:* $DIAG"$'\n'"*Qué hacer:* $ACCION"$'\n'"<$RUN_URL|Ver run en GitHub Actions>"$'\n'"$EXTRA"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg t "$TEXT" '{text: $t, username: "BA Colaborativa Bot", icon_emoji: ":rotating_light:"}')" \
            "$SLACK_WEBHOOK_URL_ERROR" || echo "(curl al webhook falló)"
