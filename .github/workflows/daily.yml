name: Bajada diaria de tickets BA Colaborativa

on:
  # Cada 6h: mantiene cookies de Keycloak vivas sin generar spam cuando el
  # chain está roto (captcha persistente). Si se rompe, refrescar la sesión
  # con ./scripts/refresh-session.sh y opcionalmente subir frecuencia.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      skip_slack:
        description: "No mandar mensaje a Slack (útil para pruebas)"
        type: boolean
        default: false

# Si ya hay un run corriendo cuando llega el siguiente cron, lo encola en vez
# de correrlo en paralelo. Dos logins concurrentes pueden pisar el secret
# BA_SESSION_JSON o gastar dos slots de CapSolver.
concurrency:
  group: ba-colaborativa-pipeline
  cancel-in-progress: false

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    # 45 min para que MAX_ATTEMPTS=10 entre dentro del presupuesto sin que
    # GH Actions cancele a mitad de camino.
    timeout-minutes: 45

    env:
      # Credenciales de BA Colaborativa (fallback si las cookies expiraron).
      BA_USER: ${{ secrets.BA_USER }}
      BA_PASSWORD: ${{ secrets.BA_PASSWORD }}

      # Cookies pre-autenticadas extraídas con scripts/dump_cookies.py.
      # Saltean el login del SPA. Cuando expiren (típico días/semanas),
      # alguien del equipo refresca con el runbook del README.
      BA_SESSION_JSON: ${{ secrets.BA_SESSION_JSON }}

      # Google Sheets
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_TAB: ${{ vars.SHEET_TAB || 'Tickets - General' }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      # En CI lanzamos Chrome NOSOTROS (no Playwright) y nos conectamos por
      # CDP — así Chrome arranca SIN flags de automation y reCAPTCHA no nos
      # detecta como bot. Replicamos lo que hace ./scripts/chrome-cdp.sh local.
      HEADLESS: "false"
      BROWSER_MODE: cdp
      CDP_URL: http://localhost:9222
      LOGIN_MODE: auto
      # 10 intentos por corrida. Después de N fallos consecutivos con captcha,
      # Keycloak eventualmente skipea y la corrida pasa. 10 chances le dan más
      # margen para esa "suerte" sin gastarnos más que ~$0.05/día en CapSolver.
      MAX_ATTEMPTS: "10"
      SAVED_FILTER_NAME: ${{ vars.SAVED_FILTER_NAME || 'Asignados a Milton' }}

      # Notificación por mail en caso de fallo
      ALERT_TO_EMAIL: julieta.carmona@educabot.com
      # Configurar uno de los dos backends de mail:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      # Slack — dos webhooks separados:
      # - SLACK_WEBHOOK_URL: éxitos (canal del equipo). Mensaje "✅ N tickets…"
      # - SLACK_WEBHOOK_URL_ERROR: errores (canal privado del owner).
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
      # SKIP_SLACK=1 silencia el webhook de éxito sin tickets nuevos. Lo
      # activamos solo en pruebas manuales con skip_slack=true. El cron
      # cada hora NO lo activa: notify.send_success_message ya se encarga
      # de mandar a Slack solo cuando added>0 (forced), así que el cron
      # silencioso no spamea.
      SKIP_SLACK: ${{ inputs.skip_slack == true && '1' || '' }}
      # Solvers de captcha. Si ambos están, scraper.py prueba CapSolver primero
      # (mejor con reCAPTCHA Enterprise V3 del GCBA) y cae a anti-captcha si falla.
      CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
      ANTICAPTCHA_API_KEY: ${{ secrets.ANTICAPTCHA_API_KEY }}
      # Link al Sheets (se incluye al final de cada mensaje de Slack).
      SHEET_LINK: ${{ vars.SHEET_LINK }}
      # SMTP_HOST: ${{ secrets.SMTP_HOST }}
      # SMTP_PORT: ${{ secrets.SMTP_PORT }}
      # SMTP_USER: ${{ secrets.SMTP_USER }}
      # SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome (canal "chrome" para channel=chrome)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Playwright browsers + system deps
        run: python -m playwright install --with-deps chromium chrome

      - name: Install Xvfb (display virtual para correr headed)
        run: sudo apt-get install -y xvfb

      - name: Lanzar Chrome con remote debugging (NO con Playwright)
        # Lanzamos Chrome NOSOTROS via shell, sin flags de automation, así
        # reCAPTCHA no lo detecta como bot. Después el scraper se conecta por
        # CDP. Replica exactamente lo que hace ./scripts/chrome-cdp.sh local.
        run: |
          # Display virtual
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 1
          export DISPLAY=:99
          # Chrome con remote debugging, perfil dedicado
          mkdir -p /tmp/chrome-cdp-profile
          google-chrome \
            --remote-debugging-port=9222 \
            --user-data-dir=/tmp/chrome-cdp-profile \
            --no-default-browser-check \
            --no-first-run \
            --disable-dev-shm-usage \
            --no-sandbox \
            'about:blank' &
          # Esperar a que el puerto CDP esté listo (max 30s)
          for i in {1..30}; do
            if curl -sf http://localhost:9222/json/version > /dev/null; then
              echo "✓ Chrome CDP listo (intento $i)"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:9222/json/version

      - name: Run pipeline (CDP a Chrome lanzado externamente)
        run: |
          export DISPLAY=:99
          python main.py

      - name: Refrescar BA_SESSION_JSON con cookies renovadas
        # Solo si la corrida fue OK y el scraper dejó session_refreshed.json.
        # Esto extiende la vida de la sesión: las cookies que Keycloak renovó
        # durante esta corrida quedan guardadas para la siguiente.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f downloads/session_refreshed.json ] && [ -n "$GH_TOKEN" ]; then
            gh secret set BA_SESSION_JSON \
              --body "$(cat downloads/session_refreshed.json)" \
              --repo ${{ github.repository }}
            echo "✓ Secret BA_SESSION_JSON actualizado con cookies frescas."
          else
            echo "(no actualizo secret — falta el archivo o GH_PAT no configurado)"
          fi

      - name: Upload exported file as artifact (on failure for debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-dumps
          path: downloads/
          if-no-files-found: ignore

      - name: Avisar a Slack si el job falló o fue cancelado por timeout
        # Si el job se cancela (timeout 45min), GitHub mata Python antes de que
        # mande la noti de error desde adentro. Este step corre fuera del
        # proceso Python y SÍ avisa al canal de errores (mis-bots-notis).
        if: ${{ (failure() || cancelled()) && env.SLACK_WEBHOOK_URL_ERROR != '' }}
        env:
          SLACK_WEBHOOK_URL_ERROR: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$STATUS" = "cancelled" ]; then
            REASON="⏱️ El job se canceló (probablemente timeout 45min — el scraper se quedó colgado)."
          else
            REASON="❌ El job falló antes de completar el pipeline."
          fi
          TRIGGER="cron \`$SCHEDULE\`"
          [ "$EVENT" = "workflow_dispatch" ] && TRIGGER="dispatch manual"
          TEXT=":rotating_light: *BA Colaborativa cron cayó* ($TRIGGER)\n$REASON\n<$RUN_URL|Ver run en GitHub Actions>"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg t "$TEXT" '{text: $t}')" \
            "$SLACK_WEBHOOK_URL_ERROR" || echo "(curl al webhook falló)"
